name: TodoApp iOS Appium Tests
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  appium-tests:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: maven }
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
      - name: Install Appium and XCUITest driver
        run: |
          npm install -g appium
          appium driver install xcuitest
      - name: Boot iOS simulator
        shell: bash
        run: |
          DEVICE_NAME="iPhone 17"
          DEVICE_ID=$(xcrun simctl list devices available | sed -n '/-- iOS 26.4 --/,/-- iOS/p' | grep "$DEVICE_NAME" | head -1 | sed -E 's/.*\(([0-9A-F-]{36})\).*/\1/')
          test -n "$DEVICE_ID" || { xcrun simctl list devices available; exit 1; }
          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
      - name: Build and install TodoApp
        shell: bash
        run: |
          xcodebuild -project TodoApp-XCTest.xcodeproj -scheme TodoApp-XCTest -configuration Debug -sdk iphonesimulator -destination "platform=iOS Simulator,id=$DEVICE_ID" -derivedDataPath build clean build
          APP_PATH=$(find "$PWD/build/Build/Products" -type d -name "*.app" ! -name "*Tests*.app" ! -name "*UITests*.app" | head -1)
          test -d "$APP_PATH" || exit 1
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
      - name: Start Appium
        run: |
          nohup appium --base-path / --log appium.log > /dev/null 2>&1 &
          for i in {1..30}; do curl -sf http://127.0.0.1:4723/status && exit 0; sleep 2; done
          cat appium.log; exit 1
      - name: Run tests
        working-directory: AppiumTests
        run: mvn clean test -DbundleId=test.com.TodoApp -Dudid="$DEVICE_ID" -DdeviceName="$DEVICE_NAME" -DplatformVersion=26.4 -DappPath="$APP_PATH"
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: todoapp-appium-results
          path: |
            AppiumTests/target/surefire-reports
            AppiumTests/allure-results
            AppiumTests/screenshots
            appium.log
          if-no-files-found: warn
