name: iOS Appium Automation - CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  appium-ios:
    runs-on: macos-26

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver list --installed

      - name: Show Simulators
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devicetypes
          xcrun simctl list devices available

      - name: Build iOS App
        run: |
          xcodebuild \
            -scheme TodoApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build

          find build -name "*.app"

      - name: Boot iOS 26.4 iPhone Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | sed -n '/-- iOS 26.4 --/,/-- iOS/p' | grep "iPhone" | grep "Shutdown" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')

          echo "DEVICE_ID=$DEVICE_ID"

          if [ -z "$DEVICE_ID" ]; then
            echo "No iOS 26.4 iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available | grep "$DEVICE_ID" | sed -E 's/^[[:space:]]*([^()]+).*/\1/' | xargs)

          echo "DEVICE_NAME=$DEVICE_NAME"
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Install App on Simulator
        run: |
          APP_PATH=$(find build -name "TodoApp.app" | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "DEVICE_ID=$DEVICE_ID"
          echo "DEVICE_NAME=$DEVICE_NAME"

          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" test.com.TodoApp || true

      - name: Create Report Folders
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots

      - name: Start Appium Server
        run: |
          nohup appium --address 127.0.0.1 --port 4723 --base-path / > appium.log 2>&1 &

          for i in {1..30}; do
            if curl -s http://127.0.0.1:4723/status > /dev/null; then
              echo "Appium Server Started"
              break
            fi
            sleep 2
          done

          cat appium.log

      - name: Verify Appium Server
        run: |
          curl -v http://127.0.0.1:4723/status

      - name: Run Appium Tests and Print Reports
        run: |
          cd AppiumTests

          mvn clean test \
            -DbundleId=test.com.TodoApp \
            -Dudid="$DEVICE_ID" \
            -DdeviceName="$DEVICE_NAME" \
            -DplatformVersion="26.4" \
            -Dsurefire.useFile=false || TEST_FAILED=true

          echo "===== SUREFIRE TXT REPORTS ====="
          find target/surefire-reports -name "*.txt" -type f -exec cat {} \; || true

          if [ "$TEST_FAILED" = true ]; then
            exit 1
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: ignore

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: AppiumTests/target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore

