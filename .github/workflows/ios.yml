name: iOS Appium Automation - CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  appium-ios:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PLATFORM_VERSION: "26.4"
      PREFERRED_DEVICE_NAME: "iPhone 17"
      BUNDLE_ID: "test.com.TodoApp"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Xcode
      # ---------------------------------------------------------

      - name: Select Xcode 26.4.1
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "/Applications/Xcode_26.4.1.app/Contents/Developer" ]; then
            sudo xcode-select \
              -s "/Applications/Xcode_26.4.1.app/Contents/Developer"
          else
            echo "Xcode 26.4.1 was not found. Using default Xcode."
            sudo xcode-select \
              -s "/Applications/Xcode.app/Contents/Developer"
          fi

          echo "Selected developer directory:"
          xcode-select -p

          echo "Xcode version:"
          xcodebuild -version

      # ---------------------------------------------------------
      # Java and Node
      # ---------------------------------------------------------

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: AppiumTests/pom.xml

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------
      # Appium
      # ---------------------------------------------------------

      - name: Install Appium and XCUITest Driver
        shell: bash
        run: |
          set -euo pipefail

          npm install --global appium@latest

          echo "Appium version:"
          appium --version

          appium driver install xcuitest

          echo "Installed Appium drivers:"
          appium driver list --installed

          echo "XCUITest driver diagnostics:"
          appium driver doctor xcuitest || true

      # ---------------------------------------------------------
      # Simulator
      # ---------------------------------------------------------

      - name: Show Available Simulators
        shell: bash
        run: |
          echo "===== RUNTIMES ====="
          xcrun simctl list runtimes

          echo "===== DEVICE TYPES ====="
          xcrun simctl list devicetypes

          echo "===== AVAILABLE DEVICES ====="
          xcrun simctl list devices available

      - name: Select and Boot iOS 26.4 Simulator
        shell: bash
        run: |
          set -euo pipefail

          echo "Looking for $PREFERRED_DEVICE_NAME with iOS $PLATFORM_VERSION"

          DEVICE_ID=$(
            xcrun simctl list devices available |
            sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
            grep "$PREFERRED_DEVICE_NAME (" |
            head -1 |
            sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/'
          )

          # Fall back to the first available iPhone for iOS 26.4
          if [ -z "$DEVICE_ID" ]; then
            echo "$PREFERRED_DEVICE_NAME was not found."
            echo "Selecting the first available iPhone with iOS $PLATFORM_VERSION."

            DEVICE_ID=$(
              xcrun simctl list devices available |
              sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
              grep "iPhone" |
              head -1 |
              sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/'
            )
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "ERROR: No iOS $PLATFORM_VERSION iPhone simulator was found."
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(
            xcrun simctl list devices available |
            grep "$DEVICE_ID" |
            sed -E 's/^[[:space:]]*([^()]+).*/\1/' |
            xargs
          )

          echo "Selected device name: $DEVICE_NAME"
          echo "Selected device UDID: $DEVICE_ID"

          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

          xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "===== BOOTED SIMULATOR ====="
          xcrun simctl list devices | grep "$DEVICE_ID"

      # ---------------------------------------------------------
      # Build application
      # ---------------------------------------------------------

      - name: Show Xcode Project Information
        shell: bash
        run: |
          set -euo pipefail

          echo "===== PROJECT FILES ====="
          find . -maxdepth 2 \
            \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) \
            -print

          echo "===== PROJECT SCHEMES ====="
          xcodebuild -list

      - name: Build iOS App
        shell: bash
        run: |
          set -o pipefail

          rm -rf build

          xcodebuild \
            -scheme "TodoApp" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            clean build |
            tee xcodebuild.log

          echo "===== GENERATED APPLICATIONS ====="
          find "$GITHUB_WORKSPACE/build/Build/Products" \
            -type d \
            -name "*.app" \
            -print

      # ---------------------------------------------------------
      # Install application
      # ---------------------------------------------------------

      - name: Find TodoApp Application
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(
            find "$GITHUB_WORKSPACE/build/Build/Products" \
              -type d \
              -path "*Debug-iphonesimulator*" \
              -name "TodoApp.app" \
              ! -name "*Tests*.app" |
              head -1
          )

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: TodoApp.app was not found."

            echo "Available applications:"
            find "$GITHUB_WORKSPACE/build" \
              -type d \
              -name "*.app" \
              -print || true

            exit 1
          fi

          echo "Application path: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Install App on Simulator
        shell: bash
        run: |
          set -euo pipefail

          echo "Device ID: $DEVICE_ID"
          echo "Device name: $DEVICE_NAME"
          echo "Application: $APP_PATH"
          echo "Bundle ID: $BUNDLE_ID"

          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          echo "Verifying installed application:"
          xcrun simctl get_app_container \
            "$DEVICE_ID" \
            "$BUNDLE_ID"

          echo "Launching application:"
          xcrun simctl launch \
            "$DEVICE_ID" \
            "$BUNDLE_ID"

      # ---------------------------------------------------------
      # Test report directories
      # ---------------------------------------------------------

      - name: Create Report Folders
        shell: bash
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots

      # ---------------------------------------------------------
      # Start Appium
      # ---------------------------------------------------------

      - name: Start and Verify Appium Server
        shell: bash
        run: |
          set -euo pipefail

          nohup appium \
            --address 127.0.0.1 \
            --port 4723 \
            --log-level debug \
            --log-timestamp \
            > "$GITHUB_WORKSPACE/appium.log" 2>&1 &

          APPIUM_PID=$!

          echo "APPIUM_PID=$APPIUM_PID" >> "$GITHUB_ENV"
          echo "Started Appium with PID $APPIUM_PID"

          SERVER_READY=false

          for attempt in $(seq 1 30); do
            if curl \
              --silent \
              --fail \
              "http://127.0.0.1:4723/status" \
              > appium-status.json; then

              echo "Appium Server is ready."
              cat appium-status.json
              SERVER_READY=true
              break
            fi

            echo "Waiting for Appium Server: attempt $attempt/30"
            sleep 2
          done

          if [ "$SERVER_READY" != "true" ]; then
            echo "ERROR: Appium Server did not start."
            cat "$GITHUB_WORKSPACE/appium.log" || true
            exit 1
          fi

      # ---------------------------------------------------------
      # Verify Maven dependencies
      # ---------------------------------------------------------

      - name: Verify Maven Dependencies
        working-directory: AppiumTests
        shell: bash
        run: |
          set -euo pipefail

          java -version
          mvn -version

          mvn dependency:tree \
            -Dincludes=io.appium:java-client,org.seleniumhq.selenium

      # ---------------------------------------------------------
      # Run tests
      # ---------------------------------------------------------


      - name: Run Appium Tests and Print Reports
        run: |
          cd AppiumTests
          mvn clean test \
            -DbundleId=test.com.TodoApp \
            -Dudid="$DEVICE_ID" \
            -DdeviceName="$DEVICE_NAME" \
            -DplatformVersion="26.4" \
            -Dsurefire.useFile=false || TEST_FAILED=true
          echo "===== SUREFIRE TXT REPORTS ====="
          find target/surefire-reports -name "*.txt" -type f -exec cat {} \; || true
          if [ "$TEST_FAILED" = true ]; then
            exit 1
          fi

      # ---------------------------------------------------------
      # Artifacts
      # ---------------------------------------------------------

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: warn

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: AppiumTests/target/surefire-reports
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: warn

      - name: Upload Xcode Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          path: xcodebuild.log
          if-no-files-found: ignore
